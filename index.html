<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدقة جارية</title>
    <style>
        /* تنسيق الخلفية لتكون الكعبة */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1542840410-3092f9661150?q=80&w=2000');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.4);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            width: 90%;
            max-width: 500px;
        }

        img.profile {
            max-width: 150px;
            border-radius: 50%;
            border: 4px solid #fff;
            margin-bottom: 20px;
        }

        h1 { margin-bottom: 10px; font-size: 24px; }
        p { font-size: 1.1em; line-height: 1.6; }

        /* تصميم مربع العداد الأسود باللون الأخضر */
        .counter-box {
            background-color: #000;
            padding: 15px 25px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 20px;
            border: 1px solid #333;
        }
        .counter-box p { color: #00ff41; font-weight: bold; margin: 0; font-size: 0.9em; }
        .counter-box img { display: block; margin: 5px auto 0; filter: hue-rotate(90deg) brightness(1.5); }
    </style>
</head>
<body>

    <div class="container">
        <h1>رحم الله محمود</h1>
        <img src="mahmoud.jpg" class="profile" alt="صورة محمود">
        <p>اللهم اغفر له وارحمه واجعل قبره روضة من رياض الجنة.</p>
        <p>نسألكم الدعاء له.</p>

        <div class="counter-box">
            <p>عدد الزوار</p>
            <img src="https://hitcounter.dev/no/SadkaJaryaa.svg" alt="عدد الزوار">
        </div>
    </div>

</body>
</html>
