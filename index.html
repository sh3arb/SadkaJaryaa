<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدقة جارية لمحمود</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            /* خلفية الكعبة مع تعتيم للراحة */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1542840410-3092f9661150?q=80&w=2000');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.5);
            padding: 40px 20px;
            border-radius: 25px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            width: 85%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        img.profile {
            max-width: 160px;
            border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }

        h1 { font-size: 28px; margin-bottom: 15px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        p { font-size: 1.1em; line-height: 1.8; opacity: 0.9; }

        /* تنسيق عداد الزوار ليكون رقم فقط داخل مربع أسود */
        .counter-container {
            margin-top: 30px;
        }
        .counter-label { font-size: 0.8em; color: #ccc; margin-bottom: 8px; display: block; }
        
        .counter-box {
            background-color: #000;
            padding: 10px 30px;
            border-radius: 8px;
            display: inline-block;
            border: 1px solid #333;
            box-shadow: inset 0 0 10px rgba(0,255,65,0.2);
        }
        
        /* إخفاء أيقونة العداد الأصلية وإظهار الرقم فقط */
        .counter-box img {
            display: block;
            filter: hue-rotate(90deg) brightness(1.2) contrast(2);
            height: 30px; /* تحكم في حجم الرقم هنا */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>رحم الله محمود</h1>
        <img src="mahmoud.jpg" class="profile" alt="صورة محمود">
        <p>اللهم اغفر له وارحمه واجعل قبره روضة من رياض الجنة.</p>
        <p>نسألكم الدعاء له.</p>

        <div class="counter-container">
            <span class="counter-label">عدد الزوار</span>
            <div class="counter-box">
                <img src="https://hitcounter.dev/no/SadkaJaryaa.svg" alt="عدد الزوار">
            </div>
        </div>
    </div>

</body>
</html>
