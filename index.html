<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدقة جارية عن روح المرحوم محمود</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            /* صورة الكعبة المشرفة بدقة HD عالية جداً بدون فلاتر مظلمة */
            background: url('https://images.unsplash.com/photo-1591501539219-548cb45e99db?q=100&w=2560&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* الكارت تم تغميقه قليلاً لضمان وضوح النصوص فوق خلفية الكعبة الفاتحة */
        .premium-card {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(212, 175, 55, 0.8);
            border-radius: 28px;
            padding: 40px 25px;
            text-align: center;
            max-width: 410px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            animation: fadeIn 1s ease-out;
        }

        /* إطار صورة محمود */
        .image-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 25px auto;
            border-radius: 50%;
            border: 4px solid #d4af37;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
            overflow: hidden;
            background: #1a1a1a;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .main-title {
            color: #d4af37;
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .sub-title {
            color: #ffffff;
            font-size: 17px;
            margin-bottom: 25px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        /* صندوق الدعاء */
        .dua-container {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .dua-text {
            color: #ffffff;
            font-size: 19px;
            line-height: 1.7;
            font-weight: 600;
        }

        /* الزر التفاعلي */
        .advanced-btn {
            background: linear-gradient(135deg, #aa7c11 0%, #d4af37 50%, #f3e5ab 100%);
            background-size: 200% auto;
            color: #111111;
            border: none;
            width: 100%;
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 19px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }

        .advanced-btn:active {
            transform: translateY(2px) scale(0.97);
        }

        /* رسالة الأجر */
        .reward-box {
            display: none;
            color: #4cd964;
            font-size: 24px;
            font-weight: 800;
            margin-top: 10px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(76, 217, 100, 0.15);
            border: 1px solid rgba(76, 217, 100, 0.4);
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="premium-card">
        <h1 class="main-title">صدقة جارية</h1>
        <p class="sub-title">على روح غالينا المرحوم محمود</p>

        <div class="image-container">
            <img src="mahmoud.jpg" alt="محمود رحمه الله">
        </div>

        <div class="dua-container">
            <p class="dua-text">
                اللهم اغفر له وارحمه واجعل قبره روضة من رياض الجنة واجعل الفردوس الأعلى منزلته.
            </p>
        </div>

        <button class="advanced-btn" id="prayBtn" onclick="submitPrayer()">تلاوة الدعاء ونيل الأجر</button>

        <div class="reward-box" id="rewardMessage">
            ✨ ولك أجر مثل ما دعيت ✨
        </div>
    </div>

    <script>
        function submitPrayer() {
            document.getElementById("prayBtn").style.display = "none";
            document.getElementById("rewardMessage").style.display = "block";
        }
    </script>

</body>
</html>
