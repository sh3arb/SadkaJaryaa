<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدقة جارية لمحمود</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        img { max-width: 300px; border-radius: 15px; margin: 20px 0; border: 5px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        p { font-size: 1.2em; color: #555; }
        .counter { margin-top: 30px; font-size: 0.9em; color: #888; }
    </style>
</head>
<body>

    <h1>رحم الله محمود</h1>
    <img src="mahmoud.jpg" alt="صورة محمود">
    <p>اللهم اغفر له وارحمه واجعل قبره روضة من رياض الجنة.</p>
    <p>شارك هذا الرابط وكن سبباً في الدعاء له.</p>

    <div class="counter">
        <p>عدد الزوار:</p>
        <img src="https://hitcounter.dev/no/SadkaJaryaa.svg" alt="عدد الزوار">
    </div>

</body>
</html>
