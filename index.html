<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدقة جارية | محمود</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0f0f0f; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }

        body {
            background: url('https://images.unsplash.com/photo-1591501539219-548cb45e99db?q=100&w=2560') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .container {
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            border: 2px solid var(--gold);
            border-radius: 40px;
            padding: 50px 30px;
            text-align: center;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .profile-pic {
            width: 170px; height: 170px; border-radius: 50%;
            border: 5px solid var(--gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
            margin-bottom: 25px; object-fit: cover;
        }

        h1 { color: var(--gold); font-size: 32px; margin-bottom: 10px; }
        
        #dhikr-display {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 20px;
            margin: 25px 0;
            color: white;
            font-size: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 5px solid var(--gold);
        }

        .btn-interact {
            background: linear-gradient(45deg, #aa7c11, var(--gold));
            color: black;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
        }

        /* العداد الجديد المضمون */
        .counter-footer {
            margin-top: 30px;
            background: #000;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #333;
            color: var(--gold);
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="mahmoud.jpg" class="profile-pic" alt="محمود">
        <h1>رحم الله محمود</h1>
        <p style="color: #ccc; margin-bottom: 20px;">اللهم اجعلها صدقة جارية في ميزان حسناته</p>
        
        <div id="dhikr-display">اضغط للبدء في الدعاء</div>
        <button class="btn-interact" onclick="nextDhikr()">أذكار ودعاء</button>

        <div class="counter-footer">
            عدد الزوار: <img src="https://hitcounter.dev/no/SadkaJaryaa.svg">
        </div>
    </div>

    <script>
        const dhikrs = [
            "اللهم اغفر له وارحمه وعافه واعف عنه",
            "اللهم اجعل قبره روضة من رياض الجنة",
            "اللهم أبدله داراً خيراً من داره وأهلاً خيراً من أهله",
            "اللهم نور مرقده وطيب مضجعه وآنس وحشته",
            "سُبْحَانَ اللهِ وَبِحَمْدِهِ",
            "لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ"
        ];
        let i = 0;
        function nextDhikr() {
            const el = document.getElementById('dhikr-display');
            i = (i + 1) % dhikrs.length;
            el.innerText = dhikrs[i];
        }
    </script>
</body>
</html>
