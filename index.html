<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدقة جارية لمحمود</title>
    <style>
        body { text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f9f9f9; }
        img { max-width: 300px; border-radius: 15px; margin: 20px 0; border: 5px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        p { font-size: 1.2em; color: #555; }
        
        /* تصميم مربع العداد الاحترافي */
        .counter-box {
            display: inline-block;
            background-color: #fff;
            padding: 10px 20px;
            border: 2px solid #3498db;
            border-radius: 8px;
            margin-top: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .counter-box p { margin: 0 0 5px 0; font-size: 0.8em; color: #7f8c8d; }
    </style>
</head>
<body>

    <h1>رحم الله محمود</h1>
    <img src="mahmoud.jpg" alt="صورة محمود">
    <p>اللهم اغفر له وارحمه واجعل قبره روضة من رياض الجنة.</p>
    <p>شارك هذا الرابط وكن سبباً في الدعاء له.</p>

    <div class="counter-box">
        <p>عدد الزوار</p>
        <img src="https://hitcounter.dev/no/SadkaJaryaa.svg" alt="عدد الزوار">
    </div>

</body>
</html>
